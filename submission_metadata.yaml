ai_usage_summary: |
  Used Claude (Anthropic) throughout development: for reverse-engineering the
  JD's hidden scoring logic against the released dataset (frequency counts,
  honeypot signal verification), for writing and iterating on the feature
  engineering / honeypot detection / retrieval code, and for drafting
  documentation. No candidate data was sent to any third-party LLM API at
  ranking time -- rank.py makes zero network calls, which we verified by
  running it with network access disabled (see metrics_report.md, "compute
  constraints" section).

methodology_summary: |
  Four-stage funnel (BM25 -> TF-IDF/SVD dense similarity -> rule-based feature
  scoring -> learned reranker) over 100,000 candidates against one JD. The
  central finding driving the design: the JD's own named required skills
  (Pinecone, RAG, FAISS, embeddings) are scattered near-uniformly across
  irrelevant titles in the dataset (the "anti-keyword trap", ~5% prevalence
  regardless of title), while rarer skills (BM25, Learning to Rank,
  Elasticsearch-family vector DBs, ~1.3% prevalence) are far more common
  among genuinely ML-titled candidates (97.7% of them hold at least one)
  than among everyone else (13.8%). We weight skills by category and by
  claim-strength (duration/endorsements/assessment score), not raw
  presence, and run an independent rule-based honeypot detector
  (impossible employment dates, "expert"-tier proficiency claims, duration
  mismatches) whose penalty is multiplicative and separate from semantic
  similarity -- our top candidate by pure cosine similarity is in fact a
  honeypot, which is why that separation matters. Final score blends the
  transparent rule-based composite with a GBT reranker (LightGBM LambdaMART
  when available; sklearn GradientBoostingRegressor fallback) trained on
  heuristic pseudo-labels. ~57s end-to-end on 2 CPU cores against the real
  100,000-row dataset, well under the 5-minute budget.

